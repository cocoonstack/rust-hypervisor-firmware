name: Build and Release Dev

on:
  push:
    branches: [dev]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Fix target spec for newer nightly
        run: |
          # Ensure target-pointer-width and target-c-int-width are integers
          # (newer nightly requires integers, not strings)
          python3 -c "
          import json
          with open('x86_64-unknown-none.json', 'r') as f:
              data = json.load(f)
          data['target-pointer-width'] = 64
          data['target-c-int-width'] = 32
          with open('x86_64-unknown-none.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          "

      - name: Build firmware (release)
        run: |
          cargo +nightly build --release \
            --target x86_64-unknown-none.json \
            -Zbuild-std=core \
            -Zbuild-std-features=compiler-builtins-mem \
            -Zjson-target-spec

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: hypervisor-fw
          path: target/x86_64-unknown-none/release/hypervisor-fw

      - name: Create dev release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: Dev Build
          files: target/x86_64-unknown-none/release/hypervisor-fw
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
